<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>班级交流系统 - 登录</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <div class="login-header">
                <h2>🎓 班级交流系统</h2>
                <p>校园班级沟通与管理平台</p>
            </div>
            
            <!-- 登录表单 -->
            <form id="loginForm" class="login-form">
                <div class="form-group">
                    <label>学校名称</label>
                    <input type="text" id="school" placeholder="请输入学校名称" required>
                </div>
                <div class="form-group">
                    <label>班级名称</label>
                    <input type="text" id="className" placeholder="请输入班级名称" required>
                </div>
                <div class="form-group">
                    <label>姓名</label>
                    <input type="text" id="name" placeholder="请输入姓名" required>
                </div>
                <div class="form-group">
                    <label>学号/工号</label>
                    <input type="text" id="userNo" placeholder="请输入学号/工号" required>
                </div>
                <div class="form-group">
                    <label>密码</label>
                    <input type="password" id="password" placeholder="请输入密码" required>
                </div>
                <div class="form-options">
                    <label><input type="checkbox" id="rememberPwd"> 记住密码</label>
                    <a href="javascript:;" id="forgetPwd">忘记密码？</a>
                </div>
                <button type="submit" class="btn login-btn">登录</button>
                <p class="register-tip">没有账号？<a href="javascript:;" id="toRegister">立即注册</a></p>
            </form>
        </div>
    </div>

    <!-- 注册弹窗 -->
    <div id="registerModal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h3>账号注册</h3>
            <form id="registerForm">
                <div class="form-group">
                    <label>身份</label>
                    <select id="role" required>
                        <option value="student">学生</option>
                        <option value="teacher">教师/班主任</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>学校</label>
                    <input type="text" id="regSchool" required>
                </div>
                <div class="form-group">
                    <label>班级</label>
                    <input type="text" id="regClass" required>
                </div>
                <div class="form-group">
                    <label>姓名</label>
                    <input type="text" id="regName" required>
                </div>
                <div class="form-group">
                    <label>学号/工号</label>
                    <input type="text" id="regNo" required>
                </div>
                <div class="form-group">
                    <label>密码</label>
                    <input type="password" id="regPwd" required>
                </div>
                <button type="submit" class="btn">注册</button>
            </form>
        </div>
    </div>

    <script src="login.js"></script>
</body>
</html>
